# @package _global_


defaults:
  - torch: default
  - hydra: default
  - exp: tracker_track_selection
  - paths: default
  - feature_set: pqv
  - datamodule: default
  - augmentation: none
  - preprocessing: tracker-track-log_minmax
  - model: latent_attention
