    rpc_hit_data_mask: rpc_hit_data_mask
    gem_hit_prep: gem_hit
    gem_hit_data_mask: gem_hit_data_mask

exp:
  name: tracker-track-selection_run3
  target_key: is_tracker_muon
  pos_weight: 30.0

paths:
